# EcoSort Dataset Category Mapping Configuration
# Map categories from various external datasets to the EcoSort 4-class system

# EcoSort Target Categories
target_classes:
  - recyclable    # Recyclable waste
  - hazardous     # Hazardous waste
  - kitchen       # Kitchen waste / Food waste
  - other         # Other waste / Residual waste

# TrashNet Dataset Mapping (6 -> 4)
trashnet_mapping:
  cardboard: recyclable
  glass: recyclable
  metal: recyclable
  paper: recyclable
  plastic: recyclable
  trash: other

# Garbage Classification Dataset Mapping
# Common categories: batteries, biological, brown-glass, cardboard, clothes,
            # green-glass, metal, paper, plastic, shoes, trash, white-glass
garbage_classification_mapping:
  # Recyclable waste
  cardboard: recyclable
  paper: recyclable
  plastic: recyclable
  metal: recyclable
  brown-glass: recyclable
  green-glass: recyclable
  white-glass: recyclable
  clothes: recyclable  # Partially recyclable

  # Hazardous waste
  batteries: hazardous

  # Kitchen waste
  biological: kitchen

  # Other waste
  shoes: other
  trash: other

# Waste Classification Dataset Mapping
# Common categories: organic, recyclable, hazardous, landfill
waste_classification_mapping:
  organic: kitchen
  recyclable: recyclable
  hazardous: hazardous
  landfill: other

# Custom Mapping Rules
custom_rules:
  # Map to corresponding category if category name contains the following keywords
  keyword_mapping:
    recyclable:
      - recycle
      - plastic
      - paper
      - glass
      - metal
      - can
      - bottle
      - cardboard

    hazardous:
      - battery
      - hazard
      - toxic
      - chemical
      - medical
      - pill
      - tube

    kitchen:
      - food
      - organic
      - bio
      - kitchen
      - waste
      - fruit
      - vegetable

    other:
      - trash
      - landfill
      - residue
      - general
