# EcoSort EfficientNet-B3 Configuration

# Model configuration
model:
  type: "efficientnet"
  backbone: "efficientnet-b3"
  num_classes: 6
  pretrained: true
  dropout: 0.3
  drop_connect_rate: 0.2

# Data configuration
data:
  root_dir: "data/raw"
  img_size: 256
  batch_size: 32
  num_workers: 4
  val_split: 0.2
  shuffle: true

# Training configuration
training:
  epochs: 50
  learning_rate: 0.001
  optimizer: "adamw"
  weight_decay: 0.0001
  scheduler: "cosine"
  use_amp: true
  early_stopping_patience: 10
  gradient_clip_val: 1.0

# Loss configuration
loss:
  type: "cross_entropy"
  label_smoothing: 0.1

# Data augmentation
augmentation:
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.2
  rotation_degrees: 15
  color_jitter:
    brightness: 0.3
    contrast: 0.3
    saturation: 0.3

# Checkpoint configuration
checkpoint:
  dir: "checkpoints"
  save_interval: 10
  save_best_only: true

# WandB configuration
wandb:
  project: "ecosort-classification"
  entity: null
  tags: ["efficientnet", "b3"]

